{% extends "base.html" %}

{% block content %}

<b>hello, {{user.username}}</b>


<p><a href="{% url "accounts:login" %}">Login</a></p>

<form action="{% url "accounts:logout" %}" method="POST">
    {% csrf_token %}
    <input type="submit" value="LOGOUT">
</form>

<h1>전체 유저 목록</h1>

<ul>
{% for user in users %}
<li>
    {{user.username}}
    <ul>
        <li>{{user.score}}</li>
    </ul>
</li>
<hr>
{% endfor %}
</ul>

{% endblock content %}
