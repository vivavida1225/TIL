<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>로또 추천 번호</h1>
    <button id="btn">행운 번호 받기</button>
    <div></div>

    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script>
      // 1. 필요한 요소 선택
      const btnTag = document.querySelector('#btn')
      const divTag = document.querySelector('div')

      // 2. 로또 번호를 화면에 출력하는 함수 (이벤트 핸들러)
      const getLottoHandler = function(event) {
        const numbers = _.range(1, 46)
        const sixNumbers = _.sampleSize(numbers, 6)
        console.log(sixNumbers)
        
        // ul태그 생성
        const ulTag = document.createElement('ul')
        // 순회하면서 각 번호를 li태그로 만들고 ul에 추가
        sixNumbers.forEach((number) => {
          const liTag = document.createElement('li')
          liTag.textContent = number
          ulTag.appendChild(liTag)
        })
        divTag.appendChild(ulTag)
      }

      // 3. 버튼 요소에 이벤트 핸들러를 등록
      btnTag.addEventListener('click', getLottoHandler)
    </script>
  </body>
</html>
