<!DOCTYPE html>
<!-- [1-1] 브라우저가 가장 먼저 읽는 HTML 문서 -->
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <!-- 모바일에서도 화면이 잘 보이도록 하는 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이터 시각화 라이브 코드 (Vue + Chart.js + ECharts)</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <!--
      [1-1] Vue가 화면 전체를 그릴 "빈 상자"
      main.js의 createApp(...).mount('#app') 가 이 div 안에 App.vue를 넣습니다.
    -->
  <div id="app"></div>

  <!--
      [1-2] 진입점 JavaScript
      type="module" → 최신 방식의 JS 파일을 불러옵니다 (import/export 사용)
    -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
