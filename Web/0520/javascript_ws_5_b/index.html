<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .photos img {
      width: 500px;
    }
  </style>
</head>

<body>
  <h1> Astronomy Picture of the Day - Step 2</h1>
  <form>
    <label for="random-date">날짜 입력 : </label>
    <input type="date" name="random-date" id="random-date">
    <button type="submit">Search</button>
  </form>
  <hr>
  <div class="photos"></div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const API_URL = 'https://api.nasa.gov/planetary/apod'
    const API_KEY = 'NiKNuzrZ3STSeWHiX3wwXTr6CLENeYbN4cCPa66M'
    // 아래에 코드 작성

    // 1. async 로 함수 작성
    const getPicture = async function () {
      // 기존 div 태그 안의 내용물 모두 지우고 시작
      imageDivTag.innerHTML = ''

      try {
        const response = await axios({
          method: 'get',
          url: `${API_URL}`,
          params : {
            api_key : `${API_KEY}`,
            date : `${inputDate}`,
          },
        })

        // 2. 응답이 제대로 왔다면?
        console.log(response.data.url)
        const receivedURL = response.data.url

        // 예외처리 : mp4의 링크가 오는 경우 깨져 보임
        if (receivedURL.slice(-3) === 'mp4') {
          const noPicPTag = document.createElement('p')
          noPicPTag.textContent = "해당일은 mp4를 제공합니다."
          imageDivTag.appendChild(noPicPTag)
          return
        }

        // 예외처리 : 제대로 된 url이 안 왔다면
        if (receivedURL.trim() === '') {
          const noPicPTag = document.createElement('p')
          noPicPTag.textContent = "해당일의 사진이 없습니다."
          imageDivTag.appendChild(noPicPTag)
          return
        }

        // 2.1 img태그 생성
        const imgTag = document.createElement('img')
        // 2.3 div태그 안에 img태그 삽입
        imgTag.src = receivedURL
        imageDivTag.appendChild(imgTag)
                
      } catch (error) {
        console.log(error)
        const noPicPTag = document.createElement('p')
        noPicPTag.textContent = "해당일의 사진이 없습니다."
        imageDivTag.appendChild(noPicPTag)
        return        
      }
    }

    // 3. form 에서 날짜 input 받고 변수에 저장
    let inputDate = ''
    // class 가 photos 인 div태그 선택
    const imageDivTag = document.querySelector('.photos') 
    const dateFormTag = document.querySelector('form')
    const dateInputTag = document.querySelector('#random-date')

    dateFormTag.addEventListener('submit', function (event) {
      event.preventDefault()
      inputDate = dateInputTag.value
      // console.log(inputDate)
      getPicture()
    })


  </script>
</body>

</html>
