{% extends 'base.html' %}
{% block title %}여행 플랜 공유하기 - 야무짐{% endblock %}

{% block extra_css %}
<style>
    .create-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 650px;
        margin: 0 auto;
    }

    .create-card {
        width: 100%;
        position: relative;
        overflow: visible;
        padding: 3rem;
    }

    .create-icon-container {
        font-size: 2.8rem;
        background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.75rem;
        text-align: center;
    }

    .create-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        text-align: center;
        background: linear-gradient(to right, #ffffff, #c7d2fe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .create-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 2.5rem;
        line-height: 1.5;
        text-align: center;
    }

    /* Back Link */
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        transition: all 0.3s ease;
        text-decoration: none;
    }

    .back-btn:hover {
        color: var(--accent-color);
        transform: translateX(-4px);
    }

    /* Custom Form Layout */
    .form-group {
        margin-bottom: 1.8rem;
        text-align: left;
    }

    .form-label {
        display: block;
        font-size: 0.95rem;
        font-weight: 600;
        color: white;
        margin-bottom: 0.75rem;
    }

    .required-badge {
        color: #ff5252;
        font-size: 0.8rem;
    }

    .form-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 0.9rem 1.2rem;
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-sizing: border-box;
    }

    .form-input::placeholder {
        color: rgba(255, 255, 255, 0.2);
    }

    .form-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 15px rgba(124, 77, 255, 0.3);
        background: rgba(255, 255, 255, 0.05);
    }

    .form-select {
        color-scheme: dark;
        cursor: pointer;
    }

    .form-textarea {
        resize: vertical;
        min-height: 150px;
        line-height: 1.6;
    }

    /* Submit Button */
    .btn-submit-post {
        background: linear-gradient(135deg, var(--primary-color), #4a148c);
        color: white;
        font-weight: 700;
        font-size: 1rem;
        border: none;
        width: 100%;
        padding: 1rem;
        border-radius: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
        margin-top: 1rem;
    }

    .btn-submit-post:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(124, 77, 255, 0.55);
    }

    /* Spring entrance animation */
    .create-card {
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
    }

    .create-card.slide-init {
        transform: translateX(100vw) scale(0.95);
        opacity: 0;
    }

    .create-card.slide-active {
        transform: translateX(0) scale(1);
        opacity: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="create-wrapper" id="post-create-wrapper">
    <div class="glass-card create-card slide-init" id="post-create-card">
        
        <!-- Back Link -->
        <a href="{% url 'community:post_list' %}" class="back-btn" id="btn-back-board">
            <i class="fa-solid fa-arrow-left"></i> 커뮤니티 광장으로 돌아가기
        </a>

        <div class="create-icon-container" id="create-brand-icon">
            <i class="fa-solid fa-pen-nib"></i>
        </div>
        
        <h2 class="create-title" id="heading-create">여정 자랑하기</h2>
        <p class="create-subtitle" id="subheading-create">
            내가 세워둔 고유의 여정 일정을 공유광장에 등록하고,<br>
            다른 회원들과 알찬 조언 및 이야기를 나누어 보세요!
        </p>

        <form method="POST" action="{% url 'community:post_create' %}" id="post-create-form">
            {% csrf_token %}

            <!-- 1. 일정 선택 dropdown -->
            <div class="form-group" id="group-travel-select">
                <label class="form-label" for="travel-select-box">
                    자랑할 여행 일정 <span class="required-badge"><i class="fa-solid fa-asterisk"></i> 필수</span>
                </label>
                <select name="travel" id="travel-select-box" class="form-input form-select" required>
                    <option value="" disabled selected hidden>자랑할 나의 일정을 골라주세요...</option>
                    {% for travel in travels %}
                        <option value="{{ travel.id }}">
                            [{% for country in travel.countries.all %}{{ country.name }}{% if not forloop.last %}, {% endif %}{% endfor %}]
                            {{ travel.start_date|date:"m월 d일" }} ~ {{ travel.end_date|date:"m월 d일" }} 일정
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- 2. 게시글 제목 -->
            <div class="form-group" id="group-post-title">
                <label class="form-label" for="input-post-title">
                    게시글 제목 <span class="required-badge"><i class="fa-solid fa-asterisk"></i> 필수</span>
                </label>
                <input type="text" name="title" id="input-post-title" required class="form-input" 
                       placeholder="나만의 여정을 드러내는 매력적인 제목 입력..." autocomplete="off">
            </div>

            <!-- 3. 게시글 본문 -->
            <div class="form-group" id="group-post-content">
                <label class="form-label" for="input-post-content">
                    본문 내용 <span class="required-badge"><i class="fa-solid fa-asterisk"></i> 필수</span>
                </label>
                <textarea name="content" id="input-post-content" required class="form-input form-textarea"
                          placeholder="여행 일정에 대한 세부 루트 설명, 꿀팁, 준비물 등의 자랑거리 기입..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit-post" id="btn-submit-post-form">
                여정 자랑글 등록 완료 <i class="fa-solid fa-circle-check"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const card = document.getElementById("post-create-card");
        
        // Trigger entrance slide
        if (card) {
            card.offsetHeight; // force reflow
            card.classList.add("slide-active");
        }
    });
</script>
{% endblock %}
