<!DOCTYPE html>
<html lang='en'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Cat API with async/await</title>
</head>

<body>
  <!-- Lifecycle hooks + 선언적 렌더링 + async/await 패턴 -->
  <div id='app'>
    <button @click='getCatImage'>냥냥펀치</button>

    <!--
      [데이터 흐름]
      imgUrl(ref) 값이 존재할 때만 <img> 태그가 DOM에 렌더링됨
      - v-if: imgUrl에 값이 있을 때만 요소를 생성
      - :src (v-bind:src): imgUrl의 값을 src 속성에 바인딩
    -->
    <div v-if='imgUrl'>
      <img :src='imgUrl' alt='랜덤 고양이 이미지'>
    </div>
  </div>

  <script src='https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js'></script>
  <script src='https://unpkg.com/vue@3/dist/vue.global.js'></script>
  <script>
    const { createApp, ref, onMounted } = Vue
    const API_URL = 'https://api.thecatapi.com/v1/images/search'

    const app = createApp({
      setup() {
        // [상태 선언] 이미지 URL을 담을 반응형 변수
        const imgUrl = ref(null)

        // [핵심] async 키워드 => 함수가 Promise를 반환
        const getCatImage = async function () {
          // try / catch 로 에러 핸들링 (.catch() 대체)
          try {
            // await: Promise가 resolve될 때까지 기다린 뒤 결과를 변수에 담음
            // => .then() 콜백 체이닝 없이 동기 코드처럼 위에서 아래로 읽힘
            const response = await axios({
              method: 'get',
              url: API_URL,
            })

            // 응답이 도착한 뒤에야 다음 줄이 실행됨
            imgUrl.value = response.data[0].url
            console.log('새 이미지 URL:', imgUrl.value)
          } catch (error) {
            // 네트워크 에러, 4xx/5xx 응답 모두 여기서 처리
            console.log('실패했다옹', error)
          }
        }

        // mounted 시점에 첫 이미지 요청
        // onMounted 콜백 자체도 async 함수로 만들 수 있음
        onMounted(async () => {
          console.log('컴포넌트 마운트 완료 - 첫 요청 시작')
          await getCatImage()
          console.log('첫 요청 완료')
        })

        return { imgUrl, getCatImage }
      }
    })

    app.mount('#app')
  </script>
</body>

</html>
