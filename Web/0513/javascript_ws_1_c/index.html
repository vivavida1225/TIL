<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .article {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #f9f9f9;
    }
  </style>
</head>

<body>
  <div id="container">
  </div>
  <script>
    // 아래에 코드 작성
    const containerDiv = document.querySelector('#container')
    containerDiv.classList.add('article')

    // 제목과 밑의 선 부분
    const titleH1Tag = document.createElement('h1')
    titleH1Tag.textContent = '기사 제목'
    const hrTag = document.createElement('hr')
    containerDiv.appendChild(titleH1Tag)
    containerDiv.appendChild(hrTag)

    // 기사 내용 부분
    const contentPtag = document.createElement('p')
    contentPtag.textContent = '연구에 도움을 주었는데도 되레 자신의 이야기를 들어줘서 고맙다는 이들이 많았다. 공짜로 이런 얘기를 하는 게 쉽지 않다고 했다. 공짜라는 단어가 연구자 이승연에게 깊이 남았다. “말을 들어주는 건 원래 공짜인데, 어쩌다 남의 이야기를 들어주는 게 유료인 사회가 되었을까?” 거기서 시작된 의문이 〈손절사회〉라는 단행본으로 이어졌다. ‘손절’이라는 키워드는 갈등을 조정하는 대신 손쉽게 관계를 종료하는, 우리 시대의 인간관계를 상징한다.'
    containerDiv.appendChild(contentPtag)
 </script>
</body>

</html>
