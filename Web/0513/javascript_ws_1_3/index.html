<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <h1>오늘 할 일</h1>
  <hr>
  <ul>
    <li>수업 복습 하기</li>
    <li>실습 문제 풀기</li>
    <li>스터디 참여하기</li>
    <li>1 일 1 커밋하기</li>
    <li id="game">게임 하기</li>
  </ul>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script>
    // 아래에 코드 작성
    const title = document.querySelector('h1')
    console.log(title)

    const todoList = document.querySelectorAll('li')
    console.log(todoList)

    const itemGame = document.querySelector('#game')
    console.log(itemGame)

    title.textContent = '오늘 공부 목록'

    const studyList = document.querySelector('ul')
    // list-group 클래스 추가
    studyList.classList.add('study', 'list-group')

    studyList.removeChild(itemGame)

    // 각각 변수에 할당
    const item1 = document.querySelector('li:nth-child(1)')
    const item2 = document.querySelector('li:nth-child(2)')
    const item3 = document.querySelector('li:nth-child(3)')
    const item4 = document.querySelector('li:nth-child(4)')

    // 각각 클래스 추가
    item1.classList.add('list-group-item')
    item2.classList.add('list-group-item')
    item3.classList.add('list-group-item')
    item4.classList.add('list-group-item')

    item2.setAttribute('aria-current', 'true')
    item2.classList.add('active')

  </script>
</body>
</html>
